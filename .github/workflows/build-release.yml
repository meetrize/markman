name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or publish, for example v0.1.0"
        required: true
        type: string
      release_title:
        description: "Optional release title. Defaults to Markman <release_tag>."
        required: false
        type: string
      release_notes:
        description: "Optional Markdown release notes. They are prepended to generated notes."
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-2025
            artifact: markman-windows-x86_64
            archive_suffix: windows-x86_64.zip
          - name: Windows ARM64
            os: windows-11-arm
            artifact: markman-windows-aarch64
            archive_suffix: windows-aarch64.zip
          - name: Linux x86_64
            os: ubuntu-22.04
            artifact: markman-linux-x86_64
            archive_suffix: linux-x86_64.tar.gz
          - name: Linux ARM64
            os: ubuntu-22.04-arm
            artifact: markman-linux-aarch64
            archive_suffix: linux-aarch64.tar.gz
          - name: macOS x86_64
            os: macos-15-intel
            artifact: markman-macos-x86_64
            archive_suffix: macos-x86_64.zip
          - name: macOS aarch64
            os: macos-15
            artifact: markman-macos-aarch64
            archive_suffix: macos-aarch64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        shell: bash
        run: |
          rustup update stable
          rustup default stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake clang libssl-dev \
            libfontconfig1-dev libfreetype6-dev \
            libx11-dev libxcb1-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxdamage-dev libxfixes-dev libxrender-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libgl1-mesa-dev libvulkan-dev

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          New-Item -ItemType Directory -Force dist/package | Out-Null
          Copy-Item target/release/markman.exe dist/package/markman.exe
          Copy-Item README.md dist/package/README.md
          Copy-Item LICENSE-APACHE dist/package/LICENSE-APACHE
          $archive = "markman-${env:RELEASE_TAG}-${{ matrix.archive_suffix }}"
          Compress-Archive -Path dist/package/* -DestinationPath "dist/$archive" -Force

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          mkdir -p dist/package/share/applications
          mkdir -p dist/package/share/icons/hicolor/256x256/apps
          mkdir -p dist/package/share/icons/hicolor/512x512/apps
          cp target/release/markman dist/package/markman
          cp README.md LICENSE-APACHE dist/package/
          cp resources/linux/com.manyougz.Velotype.desktop dist/package/share/applications/
          cp resources/linux/icons/hicolor/256x256/apps/com.manyougz.Velotype.png dist/package/share/icons/hicolor/256x256/apps/
          cp resources/linux/icons/hicolor/512x512/apps/com.manyougz.Velotype.png dist/package/share/icons/hicolor/512x512/apps/
          archive="markman-${RELEASE_TAG}-${{ matrix.archive_suffix }}"
          tar -C dist/package -czf "dist/$archive" .

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          mkdir -p "dist/Markman.app/Contents/MacOS"
          mkdir -p "dist/Markman.app/Contents/Resources"
          cp target/release/markman "dist/Markman.app/Contents/MacOS/markman"
          cp resources/macos/Info.plist "dist/Markman.app/Contents/Info.plist"
          cp resources/macos/markman.icns "dist/Markman.app/Contents/Resources/markman.icns"
          chmod +x "dist/Markman.app/Contents/MacOS/markman"
          archive="markman-${RELEASE_TAG}-${{ matrix.archive_suffix }}"
          ditto -c -k --sequesterRsrc --keepParent "dist/Markman.app" "dist/$archive"

      - name: Create macOS PKG installer
        if: runner.os == 'macOS' && matrix.name == 'macOS aarch64'
        shell: bash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          APP_NAME="Markman"
          BUNDLE_ID="com.manyougz.Velotype"
          COMPONENT_PKG="${APP_NAME}-component.pkg"

          mkdir -p dist/pkg/root/Applications
          mkdir -p dist/pkg/scripts

          cp -R dist/${APP_NAME}.app dist/pkg/root/Applications/
          cp resources/macos/pkg/postinstall dist/pkg/scripts/
          cp resources/macos/pkg/preuninstall dist/pkg/scripts/
          chmod +x dist/pkg/scripts/*

          # Sign the app bundle with ad-hoc signature
          # This is required for the PKG installer to work properly
          xattr -cr "dist/pkg/root/Applications/${APP_NAME}.app" 2>/dev/null || true
          codesign --force --deep --sign - "dist/pkg/root/Applications/${APP_NAME}.app" || {
            echo "Warning: Code signing failed, continuing anyway..."
          }

          pkgbuild --root dist/pkg/root \
            --scripts dist/pkg/scripts \
            --identifier "$BUNDLE_ID" \
            --version "$VERSION" \
            --install-location "/" \
            dist/pkg/${COMPONENT_PKG}

          cp resources/macos/pkg/Distribution.xml dist/pkg/
          sed -i '' "s/__VELOTYPE_VERSION__/${VERSION}/g" dist/pkg/Distribution.xml

          productbuild --distribution dist/pkg/Distribution.xml \
            --package-path dist/pkg \
            "dist/markman-${RELEASE_TAG}-macos.pkg"

          pkgutil --expand "dist/markman-${RELEASE_TAG}-macos.pkg" "dist/pkg/expanded" || true
          if [ -f "dist/pkg/expanded/${COMPONENT_PKG}/PackageInfo" ]; then
            sed -i '' '/<relocate>/,/<\/relocate>/d' "dist/pkg/expanded/${COMPONENT_PKG}/PackageInfo"
            pkgutil --flatten "dist/pkg/expanded" "dist/markman-${RELEASE_TAG}-macos.pkg"
            rm -rf "dist/pkg/expanded"
          fi

          rm -rf dist/pkg

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/markman-${{ env.RELEASE_TAG }}-${{ matrix.archive_suffix }}
          if-no-files-found: error

      - name: Upload macOS PKG artifact
        if: runner.os == 'macOS' && matrix.name == 'macOS aarch64'
        uses: actions/upload-artifact@v7
        with:
          name: markman-macos-pkg
          path: dist/markman-${{ env.RELEASE_TAG }}-macos.pkg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate and create release tag
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TITLE: ${{ inputs.release_title }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v.+ ]]; then
            echo "release_tag must start with v, for example v0.1.0"
            exit 1
          fi

          git fetch --tags --force origin

          current_commit="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [[ "$tag_commit" != "$current_commit" ]]; then
              echo "Tag $RELEASE_TAG already points to $tag_commit, not current commit $current_commit"
              exit 1
            fi
            echo "Tag $RELEASE_TAG already exists and points to the current commit."
          else
            if [[ -z "$RELEASE_TITLE" ]]; then
              RELEASE_TITLE="Markman $RELEASE_TAG"
            fi
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" -m "$RELEASE_TITLE" "$current_commit"
            git push origin "$RELEASE_TAG"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          if [[ -z "$RELEASE_TITLE" ]]; then
            RELEASE_TITLE="Markman $RELEASE_TAG"
          fi

          if [[ -n "$RELEASE_NOTES" ]]; then
            notes_file="$(mktemp)"
            printf '%s\n' "$RELEASE_NOTES" > "$notes_file"
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --generate-notes \
              --verify-tag
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TITLE" \
              --generate-notes \
              --verify-tag
          fi
